[cerebrium.deployment]
name = "gpuhedge-moss"
python_version = "3.12"
docker_base_image_url = "debian:bookworm-slim"
disable_auth = false                 # inference requires the Bearer access token
include = ['main.py', 'moss_core.py', 'cerebrium.toml']
exclude = ['.*']

[cerebrium.hardware]
# Verified 2026-07-11 via GET rest.cerebrium.ai/v2/hardware: "ADA_L40" is the
# L40S-class enum, GPU 0.0542 c/s (= the $0.000542/s L40S rate in the plan).
compute = "ADA_L40"
cpu = 8.0
memory = 48.0                        # Hobby plan caps at 60; 48 is ample (Modal uses 32)
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 0                     # scale-to-zero: no idle billing between rounds
max_replicas = 1                     # one container per provider during the benchmark
cooldown = 30
replica_concurrency = 1
scaling_metric = "concurrency_utilization"

[cerebrium.dependencies.pip]
# torch is NOT in the base image here (unlike RunPod), so install it.
torch = "==2.11.0"
torchaudio = "==2.11.0"
transformers = "==5.9.0"
accelerate = "==1.12.0"
soundfile = "==0.13.1"
numpy = "==2.3.5"
boto3 = "latest"
hf_transfer = "latest"
huggingface_hub = "latest"
