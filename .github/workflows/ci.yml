name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q

      - name: CLI smoke test
        run: |
          python -m gpuhedge --help
          python -m gpuhedge plan
          python -m gpuhedge config

      - name: Demo smoke test (no-cloud onboarding command)
        run: python -m gpuhedge demo --requests 2

  figures-and-analysis:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + analysis deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis]"

      - name: Regenerate benchmark figures from committed traces
        run: python benchmarks/2026-07-moss/analysis.py

      - name: Validation analysis reproduces
        run: python benchmarks/2026-07-queue-cutover/analysis.py

      - name: Replay reproduces the benchmark tables
        run: python -m gpuhedge replay traces/moss_rounds.jsonl

  package-build-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Assert config is packaged
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path
          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as w:
              names = set(w.namelist())
          assert "gpuhedge/config/benchmark.yaml" in names, names
          print("benchmark.yaml packaged OK")
          PY

      - name: Wheel install smoke test
        run: |
          python -m venv /tmp/gpuhedge-smoke
          /tmp/gpuhedge-smoke/bin/python -m pip install --upgrade pip
          /tmp/gpuhedge-smoke/bin/python -m pip install dist/*.whl
          /tmp/gpuhedge-smoke/bin/python -m gpuhedge plan
          /tmp/gpuhedge-smoke/bin/python - <<'PY'
          from gpuhedge import load_config
          cfg = load_config()
          assert cfg.budget.absolute_ceiling == 50.0
          assert set(cfg.providers) == {"runpod", "modal", "cerebrium"}
          print("wheel API smoke passed")
          PY
